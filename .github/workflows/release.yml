name: Release

# Publishes build artifacts when a version tag (v*) is pushed:
#   - a Debian .deb package (built natively on Debian 12)
#   - a RHEL .rpm package (built on AlmaLinux 8 / glibc 2.28, so it runs on
#     RHEL/Alma/Rocky 8 and 9)
#   - a container image pushed to GitHub Container Registry (GHCR), built by
#     copying the Debian-built glibc binary in (no in-image compilation)
#
# Each distro package is built inside that distro's own container so the binary
# links against a matching glibc, and the container image reuses the Debian
# binary rather than compiling a second time. A crates.io publish is
# intentionally absent: the crate depends on unpublished dbt-core (Fusion) git
# crates and a `[patch.crates-io]` block for forked arrow-rs/ring, both of which
# `cargo publish` rejects. Build from source with
# `cargo install --git https://github.com/thejens/dbt-temporal` instead.
on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: "25.1"

jobs:
  deb:
    name: Debian package (.deb) + binary
    runs-on: ubuntu-latest
    container: debian:12
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl unzip ca-certificates git \
            build-essential cmake perl pkg-config libssl-dev

      - name: Install protoc
        run: |
          curl -sSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          unzip -o /tmp/protoc.zip -d /usr/local

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build
        run: cargo build --release --locked

      # Reused by the container job so the image isn't compiled a second time.
      - name: Upload binary for the container job
        uses: actions/upload-artifact@v4
        with:
          name: dbt-temporal-linux-x86_64
          path: target/release/dbt-temporal

      - name: Package .deb
        run: |
          cargo install cargo-deb
          cargo deb --no-build

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb
          fail_on_unmatched_files: true

  rpm:
    name: RHEL package (.rpm)
    runs-on: ubuntu-latest
    container: almalinux:8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          dnf -y install \
            curl unzip git \
            gcc gcc-c++ make cmake perl-core openssl-devel pkgconfig

      - name: Install protoc
        run: |
          curl -sSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          unzip -o /tmp/protoc.zip -d /usr/local

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build
        run: cargo build --release --locked

      - name: Package .rpm
        run: |
          cargo install cargo-generate-rpm
          cargo generate-rpm

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/generate-rpm/*.rpm
          fail_on_unmatched_files: true

  container:
    name: Container image
    runs-on: ubuntu-latest
    needs: [deb]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download the Debian-built binary
        uses: actions/download-artifact@v4
        with:
          name: dbt-temporal-linux-x86_64
          path: .

      - name: Make binary executable
        run: chmod +x dbt-temporal

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.release
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
